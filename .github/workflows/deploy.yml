name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/mario-style-game-custom-char-u6px78
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      # GitHub Pagesのデプロイは「Deployment failed, try again later.」という
      # 一時エラーでたまに失敗するため、失敗したら少し待って自動でリトライする
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - name: Retry deploy to GitHub Pages
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
