<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>スーパーフェイスラン</title>
<!-- iPhone: ホーム画面に追加したときの設定 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="フェイスラン">
<meta name="theme-color" content="#5c94fc">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game-wrap">
  <canvas id="game" width="960" height="540"></canvas>

  <!-- タイトル画面 -->
  <div id="title-screen" class="overlay">
    <h1>スーパーフェイスラン</h1>
    <p class="subtitle">きみの顔が主人公になる横スクロールアクション！</p>

    <div class="face-setup">
      <div class="face-preview">
        <canvas id="face-preview-canvas" width="120" height="120"></canvas>
      </div>
      <label class="btn btn-secondary" for="face-input">顔写真をえらぶ</label>
      <input type="file" id="face-input" accept="image/*" hidden>
      <button class="btn btn-ghost" id="face-reset">デフォルトに戻す</button>
    </div>

    <p class="select-label" id="select-label">モードをえらんでね</p>
    <div class="level-select" id="mode-select">
      <button class="btn btn-stage stage-1" id="mode-easy-btn">👶 かんたんモード<span class="btn-sub">3さいから・おちる穴なし</span></button>
      <button class="btn btn-stage stage-4" id="mode-hard-btn">🔥 むずかしいモード<span class="btn-sub">穴や敵がいっぱい</span></button>
      <button class="btn btn-stage stage-oni" id="mode-oni-btn">👹 鬼モード<span class="btn-sub">おとなが泣くレベル。心して挑め</span></button>
    </div>
    <div class="level-select" id="level-select" style="display: none">
      <button class="btn btn-stage stage-1" id="lv-btn-0">🌸 レベル1<span class="btn-sub">はなばたけ</span></button>
      <button class="btn btn-stage stage-2" id="lv-btn-1">🌇 レベル2<span class="btn-sub">ゆうやけ</span></button>
      <button class="btn btn-stage stage-3" id="lv-btn-2">🌊 レベル3<span class="btn-sub">うみべ</span></button>
      <button class="btn btn-stage stage-4" id="lv-btn-3">🌋 レベル4<span class="btn-sub">かざん</span></button>
      <button class="btn btn-ghost" id="mode-back-btn">← モードにもどる</button>
    </div>

    <div class="howto">
      <p>← → / A D … 移動　　スペース / ↑ / W … ジャンプ　　X / Z … ファイアボール</p>
      <p>敵は上から踏んでたおそう！ ハテナブロックからキノコ・フラワー・スターが出るよ！</p>
    </div>
  </div>

  <!-- ゲームオーバー画面 -->
  <div id="gameover-screen" class="overlay hidden">
    <h1>ゲームオーバー</h1>
    <p id="gameover-score" class="subtitle"></p>
    <button class="btn btn-primary" id="retry-btn">もういちど</button>
    <button class="btn btn-ghost" id="to-title-btn">タイトルへ</button>
  </div>

  <!-- クリア画面 -->
  <div id="clear-screen" class="overlay hidden">
    <h1 id="clear-title">ゴール！🎉</h1>
    <p id="clear-score" class="subtitle"></p>
    <button class="btn btn-primary" id="next-stage-btn">つぎのステージへ ▶</button>
    <button class="btn btn-secondary" id="clear-retry-btn">もういちど</button>
    <button class="btn btn-ghost" id="clear-title-btn">タイトルへ</button>
  </div>

  <!-- 縦持ちのときのヒント -->
  <div id="rotate-hint">📱 よこ向きにすると遊びやすいよ！</div>

  <!-- モバイル用タッチ操作 -->
  <div id="touch-controls">
    <div class="touch-left">
      <button class="touch-btn" id="touch-left">◀</button>
      <button class="touch-btn" id="touch-right">▶</button>
    </div>
    <div class="touch-right">
      <button class="touch-btn touch-fire hidden-btn" id="touch-fire">🔥</button>
      <button class="touch-btn touch-jump" id="touch-jump">JUMP</button>
    </div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
